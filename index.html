<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>null.</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>???</h1>

    <p class="subtitle">
        Доступ разрешён
    </p>

    <p class="visitors">
        Посетителей сайта: <span id="visits">...</span>
    </p>

    <button onclick="alert('Я же говорил не нажимать.')">
        Не нажимай
    </button>

    <p id="count">Просто кликер: 0</p>

    <button onclick="plus()">
        КЛИК
    </button>

    <p id="phrase"></p>

    <p id="clock"></p>

    <div class="info-box">

        <h3>Сигнал</h3>

        <p>
            Этот сайт существует скорее как эксперимент,
            чем как что-то полезное.
        </p>

        <hr>

        <p>
            inst:
            <a href="https://instagram.com/se7endm0" target="_blank">
                se7endm0
            </a>
        </p>

        <p>
            tiktok:
            <a href="https://tiktok.com/@pp01nd3x" target="_blank">
                pp01nd3x
            </a>
        </p>

        <p>
            telegram:
            <a href="https://t.me/juuzmusic_bot" target="_blank">
                @juuzmusic_bot
            </a>
        </p>

        <p>
            github:
            <a href="https://github.com/p01nd3xter/python-practice-scripts" target="_blank">
                python-practice-scripts
            </a>
        </p>

    </div>

</div>

<script>
let n = localStorage.getItem("clicks") || 0;

document.getElementById("count").textContent =
    "Просто кликер: " + n;

function plus() {
    n++;
    localStorage.setItem("clicks", n);

    document.getElementById("count").textContent =
        "Просто кликер: " + n;
}

const phrases = [
    "...",
    "сигнал потерян",
    "доступ разрешён",
    "наблюдение активно",
    "ничего интересного",
    "продолжай искать",
    "конец связи",
    "ошибка восприятия",
    "здесь пусто"
];

document.getElementById("phrase").textContent =
    phrases[Math.floor(Math.random() * phrases.length)];

setInterval(() => {
    document.getElementById("clock").textContent =
        new Date().toLocaleTimeString();
}, 1000);

document.getElementById("visits").textContent = "неизвестно";
</script>

</body>
</html>
