<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>null.</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>V01D?3</h1>

    <p class="subtitle">Доступ разрешён</p>

    <p class="visitors">
        Посетителей сайта: <span id="visits">...</span>
    </p>

    <button onclick="alert('Я же говорил не нажимать.')">
        Не нажимай
    </button>

    <p id="count">Просто кликер: 0</p>

    <button onclick="plus()">КЛИК</button>

    <button onclick="tip()">Совет</button>

    <p id="phrase"></p>
    <p id="clock"></p>
    <p id="trace"></p>
    <p id="tip"></p>

    <div class="info-box">

        <h3>Сигнал</h3>

        <p>Этот сайт существует как эксперимент.</p>

        <hr>

        <p>
            inst:
            <a href="https://instagram.com/se7endm0" target="_blank">se7endm0</a>
        </p>

        <p>
            github:
            <a href="https://github.com/p01nd3xter/python-practice-scripts" target="_blank">
                python-practice-scripts
            </a>
        </p>

    </div>

</div>

<script>
let n = localStorage.getItem("clicks") || 0;

document.getElementById("count").textContent =
    "Просто кликер: " + n;

function plus() {
    n++;
    localStorage.setItem("clicks", n);
    document.getElementById("count").textContent =
        "Просто кликер: " + n;
}

function tip() {
    const tips = [
        "Не доверяй тишине.",
        "Не ищи источник сигнала.",
        "Не сопротивляйся системе.",
        "Не пытайся убегать."
    ];

    document.getElementById("tip").textContent =
        tips[Math.floor(Math.random() * tips.length)];
}

const phrases = [
    "...",
    "Сигнал потерян",
    "Доступ разрешён",
    "Наблюдение активно",
    "Ошибка восприятия"
];

document.getElementById("phrase").textContent =
    phrases[Math.floor(Math.random() * phrases.length)];

const fakeLocations = [
    "Определение местоположения...",
    "Сигнал слабый...",
    "Обнаружен узел сети...",
    "Попытка восстановления данных...",
    "Доступ к координатам ограничен...",
    "Слишком много шума..."
];

let t = 0;

const traceInterval = setInterval(() => {
    const trace = document.getElementById("trace");

    trace.textContent = fakeLocations[t % fakeLocations.length];
    t++;

    if (t > 8) {
        clearInterval(traceInterval);

        trace.textContent = "Местоположение: Обнаружено.";
        trace.classList.add("alert");

        let flash = 0;

        const pulse = setInterval(() => {
            flash++;

            const variants = [
                "Местоположение: ОБНАРУЖЕНО",
                "Местоположение: ACCESS DENIED",
                "Местоположение: !!! ОБНАРУЖЕНО !!!",
                "Местоположение: N3 D0STUPN0",
                "Местоположение: ▓▓ ОБНАРУЖЕНО ▓▓",
                "Местоположение: ACCESS DENIED",
                "Местоположение: Обнаружено."
            ];

            trace.textContent = variants[flash % variants.length];

            if (flash === 7) {
                document.body.style.filter = "invert(1)";
            }

            if (flash === 8) {
                document.body.style.filter = "none";
            }

            if (flash > 10) {
                clearInterval(pulse);
                trace.classList.remove("alert");
                trace.textContent = "Местоположение: Доступно";
            }

        }, 400);
    }
}, 450);

setInterval(() => {
    document.getElementById("clock").textContent =
        new Date().toLocaleTimeString();
}, 1000);

document.getElementById("visits").textContent = "неизвестно";
</script>

</body>
</html>
